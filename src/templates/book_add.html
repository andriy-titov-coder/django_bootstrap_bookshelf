<!-- templates/book_add.html -->
{% extends 'base.html' %}

{% block title %}Add Book{% endblock %}

{% block content %}

<!-- Center the form using Bootstrap Grid -->
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">

    <div class="card shadow-sm">
      <div class="card-header bg-success text-white">
        <h4 class="mb-0">➕ Add a New Book</h4>
      </div>
      <div class="card-body">

        {% if error %}
        <!-- alert alert-danger — Bootstrap error notification -->
        <div class="alert alert-danger" role="alert">
          ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}

          <!-- mb-3 — margin-bottom spacing -->
          <div class="mb-3">
            <label for="title" class="form-label">Book Title</label>
            <!-- form-control — Bootstrap style for input fields -->
            <input type="text" class="form-control" id="title" name="title" required>
          </div>

          <div class="mb-3">
            <label for="author" class="form-label">Author</label>
            <input type="text" class="form-control" id="author" name="author" required>
          </div>

          <div class="mb-3">
            <label for="genre" class="form-label">Genre</label>
            <input type="text" class="form-control" id="genre" name="genre" required>
          </div>

          <div class="mb-3">
            <label for="year" class="form-label">Publication Year</label>
            <input type="number" class="form-control" id="year" name="year" required>
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">
              Description <span class="text-muted">(optional)</span>
            </label>
            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
          </div>

          <!-- d-flex gap-2 — place buttons in a row with spacing -->
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Save Book</button>
            <a href="{% url 'books:book_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>

{% endblock %}
