<!-- templates/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Books{% endblock %}</title>

  <!-- Bootstrap CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Block for additional CSS from child templates -->
  {% block extra_css %}{% endblock %}
</head>

<body class="bg-light">

<!-- Bootstrap Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{% url 'books:book_list' %}">📚 BookShelf</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'books:book_list' %}">All Books</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'books:book_add' %}">+ Add Book</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main content -->
<!-- container mt-4 — Bootstrap class for centering + top margin -->
<main class="container mt-4">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="text-center mt-5 py-3 bg-dark text-white">
  <p class="mb-0">&copy; 2026 BookShelf</p>
</footer>

<!-- Bootstrap JS via CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Block for additional JS from child templates -->
{% block extra_js %}{% endblock %}

</body>
</html>
